name: 'databricks-dbt-project'
version: '1.1.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

models:
  databricks-dbt-project:
    silver:
      +schema: silver
    gold:
      +schema: gold


on-run-start:
- "CREATE SCHEMA IF NOT EXISTS {{ target.catalog }}.silver"
- "CREATE SCHEMA IF NOT EXISTS {{ target.catalog }}.gold"